version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: helloblog-postgres
    environment:
      POSTGRES_USER: helloblog
      POSTGRES_PASSWORD: helloblog123
      POSTGRES_DB: helloblog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helloblog"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - helloblog-net

  redis:
    image: redis:7-alpine
    container_name: helloblog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - helloblog-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helloblog-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/etc/config.docker.yaml:/app/etc/config.yaml
      - uploads:/app/uploads
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - helloblog-net

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: helloblog-mcp
    ports:
      - "8081:8081"
    volumes:
      - ./backend/etc/config.docker.yaml:/app/etc/config.yaml
    environment:
      - TZ=Asia/Shanghai
    command: ["./helloblog-mcp"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - helloblog-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: helloblog-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - mcp
    restart: unless-stopped
    networks:
      - helloblog-net

volumes:
  pgdata:
  uploads:

networks:
  helloblog-net:

volumes:
  pgdata:
