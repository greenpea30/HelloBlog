version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: helloblog-postgres
    environment:
      POSTGRES_USER: helloblog
      POSTGRES_PASSWORD: helloblog123
      POSTGRES_DB: helloblog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helloblog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helloblog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
