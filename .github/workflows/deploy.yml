name: Deploy to Aliyun Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            echo "🔍 1/5 检查项目目录..."
            if [ ! -d ~/HelloBlog ]; then
              echo "📦 目录不存在，执行首次克隆（HTTPS）..."
              cd ~
              git clone https://github.com/greenpea30/HelloBlog.git HelloBlog
            fi

            echo "🔍 2/5 拉取最新代码..."
            cd ~/HelloBlog
            # 确保使用 HTTPS（SSH 需要额外配置，HTTPS 更简单可靠）
            CURRENT_URL=$(git remote get-url origin)
            if echo "$CURRENT_URL" | grep -q "^git@"; then
              echo "🔄 切换回 HTTPS 协议..."
              git remote set-url origin https://github.com/greenpea30/HelloBlog.git
            fi
            GIT_TERMINAL_PROMPT=0
            for i in 1 2 3; do
              echo "  尝试 #$i..."
              if git pull; then
                break
              fi
              if [ $i -eq 3 ]; then
                echo "❌ git pull 失败，已重试 3 次"
                exit 1
              fi
              echo "  等待 5 秒后重试..."
              sleep 5
            done

            echo "🔍 3/5 执行数据库迁移..."
            docker exec helloblog-postgres psql -U helloblog -d helloblog -c "
              CREATE TABLE IF NOT EXISTS links (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                name varchar(100) NOT NULL,
                url varchar(500) NOT NULL,
                created_at timestamp NOT NULL DEFAULT (now())
              );
            "
            docker exec helloblog-postgres psql -U helloblog -d helloblog -c "
              ALTER TABLE posts ADD COLUMN IF NOT EXISTS format varchar(10) NOT NULL DEFAULT 'markdown';
            "
            docker exec helloblog-postgres psql -U helloblog -d helloblog -c "
              CREATE TABLE IF NOT EXISTS folders (
                id BIGINT GENERATED BY DEFAULT AS IDENTITY PRIMARY KEY,
                user_id bigint NOT NULL REFERENCES users(id) ON DELETE CASCADE,
                name varchar(50) NOT NULL,
                created_at timestamp NOT NULL DEFAULT now(),
                updated_at timestamp NOT NULL DEFAULT now()
              );
            "
            docker exec helloblog-postgres psql -U helloblog -d helloblog -c "
              ALTER TABLE posts ADD COLUMN IF NOT EXISTS folder_id bigint REFERENCES folders(id) ON DELETE SET NULL;
            "
            docker exec helloblog-postgres psql -U helloblog -d helloblog -c "
              CREATE INDEX IF NOT EXISTS posts_folder_id_idx ON posts (folder_id);
            "
            docker exec helloblog-postgres psql -U helloblog -d helloblog -c "
              CREATE INDEX IF NOT EXISTS folders_user_id_idx ON folders (user_id);
            "
            echo "  迁移完成"

            echo "🔍 4/5 检查 Docker..."
            docker info > /dev/null 2>&1 || { echo "❌ Docker 未运行"; exit 1; }

            echo "🔍 5/5 构建并重启服务..."
            docker compose up -d --build

            echo ""
            echo "✅ Deploy completed!"
            echo "🌐 http://121.43.233.11/"
